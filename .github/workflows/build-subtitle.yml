name: Build IJKPlayer with Subtitle Support

on:
  workflow_dispatch:
  push:
    paths:
      - 'doc/FFmpeg/ohos_ijkffmpeg_config.sh'
      - 'ijkplayer/src/main/cpp/ijkplayer/ff_ffplay.c'
      - '.github/workflows/build-subtitle.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Checkout ohos_ijkplayer
        uses: actions/checkout@v4
        with:
          lfs: false

      # ── 1. 安装系统依赖 ───────────────────────────────────────────────────
      # 只装核心构建工具，避免 gcc-multilib 与交叉编译工具链冲突
      # prebuild.sh 内部已有 apt install（sudo 运行后有权限），会补装缺失包
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc make cmake pkg-config autoconf automake autopoint patch \
            libtool libtool-bin wget unzip gperf flex bison \
            python3 python3-pip ninja-build meson yasm nasm \
            texinfo gettext libxml2-utils libxml2 libxml2-dev \
            gfortran-aarch64-linux-gnu gfortran-arm-linux-gnueabi \
            sox subversion cabextract xmlto po4a \
            tcl8.6-dev xutils-dev libx11-dev xtrans-dev

      # ── 2. 下载 OHOS SDK API 12（缓存复用）───────────────────────────────
      # prebuild.sh 硬编码路径：$ROOT_DIR/../ohos-sdk-12/linux/12
      # 在 Actions 里 ROOT_DIR = $GITHUB_WORKSPACE，故 SDK 在其父目录下
      - name: Cache OHOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ohos-sdk-12
          key: ohos-sdk-harmonyos-5.0.0-linux-v1

      - name: Download & Extract OHOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/ohos-sdk-12
          cd ${{ runner.temp }}

          # HarmonyOS 5.0.0-Release 公开 SDK（Windows+Linux 合包，约 2.5 GiB）
          # 下载后只解出 linux/ 部分，节省磁盘空间
          SDK_URL="https://repo.huaweicloud.com/harmonyos/os/5.0.0-Release/ohos-sdk-windows_linux-public.tar.gz"
          echo "Downloading SDK (~2.5GB)..."
          wget -q --show-progress -O sdk.tar.gz "$SDK_URL"
          echo "Extracting linux/ only..."
          FIRST=$(tar -tzf sdk.tar.gz 2>/dev/null | head -5)
          echo "Archive top entries: $FIRST"
          tar -xzf sdk.tar.gz --wildcards "*/linux/*" -C ohos-sdk-12/ --strip-components=1 2>/dev/null \
            || tar -xzf sdk.tar.gz -C ohos-sdk-12/
          echo "SDK layout after extract:"
          ls ohos-sdk-12/
          ls ohos-sdk-12/linux/ 2>/dev/null || true

          # 解压内层 native zip（tar.gz 内的 linux/ 下存放的还是 .zip）
          # native zip 解压后结构为 native/...，但 prebuild.sh 期望 linux/12/native/
          NATIVE_ZIP=$(find ohos-sdk-12/linux -name "native-linux-x64-*-Release.zip" | head -1)
          echo "Found native zip: $NATIVE_ZIP"
          if [ -n "$NATIVE_ZIP" ]; then
            unzip -q "$NATIVE_ZIP" -d ohos-sdk-12/linux/
            echo "SDK linux/ after unzip:"
            ls ohos-sdk-12/linux/
            # 移动到 prebuild.sh 期望的 linux/12/ 下
            mkdir -p ohos-sdk-12/linux/12
            if [ -d ohos-sdk-12/linux/native ]; then
              mv ohos-sdk-12/linux/native ohos-sdk-12/linux/12/native
              echo "Moved: linux/native -> linux/12/native"
            fi
            echo "Final SDK linux/12/:"
            ls ohos-sdk-12/linux/12/ 2>/dev/null || echo "WARN: linux/12/ still empty!"
          else
            echo "ERROR: native zip not found!"
            exit 1
          fi

      # SDK 放到 prebuild.sh 期望的位置（$GITHUB_WORKSPACE/../ohos-sdk-12）
      - name: Link SDK to expected location
        run: |
          ln -sf ${{ runner.temp }}/ohos-sdk-12 ${{ github.workspace }}/../ohos-sdk-12
          echo "Verify toolchain:"
          find ${{ github.workspace }}/../ohos-sdk-12 -name "clang" | head -3

      # ── 3. Clone Lycium（prebuild.sh 期望路径：$ROOT_DIR/tpc_c_cplusplus）
      # GitHub 上无此仓库（openharmony-sig/tpc_c_cplusplus 不存在），只能用 gitcode
      - name: Cache Lycium
        id: cache-lycium
        uses: actions/cache@v4
        with:
          path: tpc_c_cplusplus
          key: lycium-support_x86-${{ hashFiles('prebuild.sh') }}

      - name: Clone Lycium build framework
        if: steps.cache-lycium.outputs.cache-hit != 'true'
        run: |
          git clone https://gitcode.com/openharmony-sig/tpc_c_cplusplus.git \
            -b support_x86 --depth=1 tpc_c_cplusplus
          echo "Lycium cloned:"
          ls tpc_c_cplusplus/lycium/

      # ── 4. 运行 prebuild（编译 FFmpeg + 依赖 + 产出 third_party）─────────
      # 同时缓存：编译产物(tpc_c_cplusplus/thirdparty) + 安装目录(ijkplayer/src/main/cpp/third_party)
      # prebuild.sh 的 install_depends() 会把 lycium/usr/* 复制到 third_party/，两者都要缓存
      - name: Cache compiled thirdparty libs
        id: cache-thirdparty
        uses: actions/cache@v4
        with:
          path: |
            tpc_c_cplusplus/thirdparty
            tpc_c_cplusplus/lycium/usr
            ijkplayer/src/main/cpp/third_party
          key: thirdparty-${{ hashFiles('prebuild.sh', 'doc/FFmpeg/ohos_ijkffmpeg_config.sh') }}-v2

      # prebuild.sh 内部调用 apt install（无 sudo），用 sudo 运行以获得权限
      - name: Run prebuild.sh
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: |
          sudo bash prebuild.sh
        working-directory: ${{ github.workspace }}

      # ── 5. 用 CMake 编译 NAPI .so ────────────────────────────────────────
      - name: Build NAPI .so with CMake
        run: |
          SDK_ROOT=${{ github.workspace }}/../ohos-sdk-12/linux/12/native
          TOOLCHAIN=$SDK_ROOT/build/cmake/ohos.toolchain.cmake

          echo "Toolchain: $TOOLCHAIN"
          if [ ! -f "$TOOLCHAIN" ]; then
            echo "ERROR: toolchain not found, listing SDK:"
            find ${{ github.workspace }}/../ohos-sdk-12 -name "*.cmake" | head -10
            exit 1
          fi

          mkdir -p ${{ github.workspace }}/ijkplayer/src/main/cpp/build_arm64
          cd ${{ github.workspace }}/ijkplayer/src/main/cpp/build_arm64

          BUILD_DIR=${{ github.workspace }}/ijkplayer/src/main/cpp/build_arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN \
            -DOHOS_ARCH=arm64-v8a \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=$BUILD_DIR \
            -G Ninja

          ninja -j$(nproc)

      # ── 6. 收集产物 ──────────────────────────────────────────────────────
      - name: Collect artifacts
        run: |
          OUTDIR=${{ github.workspace }}/output/arm64-v8a
          BUILD_DIR=${{ github.workspace }}/ijkplayer/src/main/cpp/build_arm64
          mkdir -p $OUTDIR

          echo "=== build_arm64 根目录 .so 诊断 ==="
          ls -lh $BUILD_DIR/*.so 2>/dev/null || echo "No .so in root"
          file $BUILD_DIR/*.so 2>/dev/null || true

          # 直接按名拷贝 build_arm64 根目录下的目标 .so
          # 不用 find 递归，避免 CMakeFiles/ 子目录里的同名 symlink 覆盖真实文件
          for SO in libijkplayer.so libijksdl.so libijkplayer_napi.so libijkplayer_audio_napi.so; do
            SRC="$BUILD_DIR/$SO"
            if [ -e "$SRC" ]; then
              REAL=$(readlink -f "$SRC")
              cp "$REAL" "$OUTDIR/$SO"
              echo "OK $SO → $(ls -lh $OUTDIR/$SO | awk '{print $5}')"
            else
              echo "MISSING $SO"
            fi
          done

          # libc++_shared.so 来自 NDK libs 目录
          LIBCPP=$(find ${{ github.workspace }} -path "*/arm64-v8a/libc++_shared.so" | head -1)
          if [ -n "$LIBCPP" ]; then
            cp "$(readlink -f $LIBCPP)" "$OUTDIR/libc++_shared.so"
            echo "OK libc++_shared.so"
          fi

          echo "=== Collected Artifacts ==="
          ls -lh $OUTDIR/
          file $OUTDIR/*.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ijkplayer-arm64-subtitle
          path: output/
          retention-days: 14

